body:
  text: 左氏釋卷下眀馮時可撰葬鮮季孫受叔仲子之言而命杜泄曰葬鮮者自西門杜泄爭之以為卿葬自朝魯禮也杜云不以壽終為鮮西門非魯朝正門也自朝從生存朝覲之正路也杜泄為穆子之宰不能止丙之誅不能止壬之逐不能救豹之死不能討牛之罪而徒兩爭於殯葬之禮欲以此謝責是何足以謝哉牛之謀叔孫也隂承季孫之謀也不然一豎耳何能以肆然無忌若是耶葬鮮之語其情見矣始化曰魄魂神也陽也氣也魄精也隂也形也人始生先有魄既成魄而後神附之形可以言魄而魄不可以言形也用物精多權勢之所聚精物之所聚也一國之政仰威福於執政精神耳目旦暮屬之鬼神亦隨而相焉故乘權藉勢則意氣日盛精爽日著至於神眀所謂心開於中尉勇見於大敵其斯之謂哉孔疏以為有權勢則能備物是未盡也史趙言陳亡晉侯問於史趙曰陳其遂亡乎對曰未也陳顓頊之族也歲在鶉火是以卒滅陳將如之今在析木之津猶將復由言顓頊以水德王其滅也歲在鶉火火盛而水滅也陳出顓頊若亡國之歲復值鶉火則滅不興矣今在析木之津水木相滋猶當復耳析木之津於十二次為位在寅即漢津也箕在東方木位斗在北方水位分析水木以箕星為隔陸氏以為復經由鶉火之次乃亡非也辨髦辨髦辨加於髦也古童子垂髦凡加冠之禮先用緇布之冠斂括垂髦次加皮辨次加爵辨三加之後去緇布之冠不復更用緇布之冠可去也辨髦不可敝也王自言己處於尊如辨髦然而若乃因以敝之乎責晉之昧大分也子卯疾日左氏辰在子卯謂之疾日漢書翼奉傳曰北方之情好也好行貪狼申子主之東方之情怒也怒行隂賊亥卯主之貪狼必待隂賊而後動隂賊必待貪狼而後用二隂並行是以王者忌子卯古之所謂疾日者言惡是日也舉事尚剛子為隂水卯為隂木故疾之也謂紂以子喪桀以卯亡故國君以為忌非也星出婺女鄭裨竈言於子産曰七月戊子晉君將死今兹歲在顓頊之虛姜氏任氏實守其地居其維首而有妖星焉告邑姜也邑姜晉之妣也天以七紀戊子逢公以登星斯於是乎出按顓頊水德位在北方即𤣥􅑎也𤣥􅑎有三宿女居維首星占婺女為既嫁之女織女為處女妖星在婺女天以告邑姜也齊守𤣥􅑎之地得歲有福故禍歸邑姜言其外孫將死也邑姜晉虞叔之妣故知禍應在晉耳二十八宿面七為天之紀無有他星客於其舍自殷諸侯居齊地者逄公死而妖星出婺女齊時未當歲星故自蒙其災也然邑姜亦成王之母而於周無災者其分尊非所敵也任姜共守其地而不及薛者其國微不足以應占也嗚呼春秋之世國非一晉也晉非一君也何獨客星之示異於斯乎誣妄不經必厯師之附㑹也五大五細賈逵云五大為太子母弟貴寵公子公孫纍世正卿也五細賤妨貴少陵長逺間親親間舊小加大也不在邊懼其逼也不在庭不當使居朝廷為政也杜以為金木水火土五官之長專盛過節則不可居邊細弱不勝任亦不可居朝此於申無宇親不在外羈不在內之言意似不相合不若賈說之近理也子産不毁司墓之室鄭簡公卒將為葬除司墓之室有當道者毁之則朝而塴子太叔請毁之曰無若諸侯之賔何子産曰諸侯之賔能來㑹吾喪豈憚日中無損於賔而民不害何故不為遂弗毁日中而葬按司墓鄭之葬公墓大夫徒屬之家也其室當殯所由之道毁之則路徑而可速至故塴以朝期弗毁則路迂而緩至故塴以日中期塴是既下棺而掩之以土也毁民室以為除先君所不安也子産全民之室而成君之德君子哉子太叔不忍於游氏之廟也而忍於人之室抑何度量之相越也九扈正義曰春扈鳻鶞相五土之宜趣民耕種者夏扈竊𤣥趣民耘苗者秋扈竊藍趣民收斂者冬扈竊黃趣民蓋藏者棘扈竊丹為巢驅鳥者行扈唶唶晝為民驅鳥者宵扈嘖嘖夜為農驅獸者桑扈竊脂為蠶驅雀者老扈鷃鷃趣民收麥令不得晏起者扈有九種令九農正依此諸扈而動作也或以其多置官方為疑此以辭害志者也九扈非九人也設一人為九農正而責以數事令隨其宜以教民使民自為動作也左氏又曰扈民無淫者也止民使不淫放即持木鐸者之類也執氷而踞櫝九箭筒也氷其蓋也可以取飲或曰公之帥徒也豈其伐人而釋甲踞坐蓋以平子之請誤之耳平子之請欲以緩攻而待救也當時季氏之徒衆矣其植本也深矣魯君欲為謀則宜藉齊晉之力待昭子之歸合孟懿子而攻之其何有於不克不知出此卒然以讒人僥幸及季氏之請又緼蓄不决始失於謀終失於斷宜其亡也或以踞為游蓋見後章有執氷以游之語然所游者是游衍不急之謂釋甲踞坐非游衍而何不當以游釋踞也都君子楚師之在潛也左司馬沈尹戌帥都君子與王馬之屬以濟師杜云都君子在都邑之士有復除者孔云此人或别有功勞或曲蒙恩澤平常免其徭役事急乃使之耳非也都君子蓋楚選知方之士以屏衛王居不用以侵伐司馬急吳故借以濟師越有君子之卒六千人亦即此也一鼓鐡晉趙鞅荀寅帥師城汝濱遂賦晉國一鼓鐵以鑄刑鼎著范宣子所為刑書焉杜云令晉國各出功力共鼓石為鐡計令一鼓而足因軍役而為之故言遂也服䖍云獻米者操量鼓鼓可操之以將命非大器也惟用一鼓則不足以成鼎家賦一鼓而鐡又太多且金鐡之物寧可以鼓量哉冶石為鐡用橐以扇火動橐謂之鼓似此辨解終為費辭按家語載此事王肅注云三十斤焉以此鑄刑書適給於用子産宣子之刑書皆變周制而為之故君子以為病三師以肄伍大夫伐楚之䇿曰楚執政衆而乖莫適任患若為三師焉一師至彼必皆出彼出則歸彼歸則出楚必道敝亟肄以罷之多方以誤之既罷而後以三軍繼之必大克之闔閭從之楚于是始病數來數往謂之肄杜以勞為釋未盡也嘗觀隋髙熲取陳之䇿曰量彼收穫之際微徴士馬聲言掩襲彼必屯兵守禦足得廢時既聚兵我便解甲再三若此彼以為常後更集兵彼必不信猶豫之頃我乃濟師此即三師以肄之故智也句卑司馬耻臣闔廬欲免其首以語句卑句卑猶不忍也至于三戰皆傷則終廢矣句卑乃布裳以效其意司馬自剄而因裹之也司馬既剄句卑卒藏其身而以其首免嗚呼司馬壯矣句卑不食言於死者亦傑士哉改步改玉季平子卒陽虎將以璵璠斂仲梁懷弗與曰改步改玉注疏云公侯佩山𤣥玉大夫佩水蒼玉是君臣玉不同也昭公之出季孫行君事佩璵璠祭宗廟今定公立復臣位改君步則亦當去璵璠或謂季孫未必佩璵璠以祭也仲梁懷之言猶曰季孫人臣未改君步則不宜佩玉耳吁季氏忍於逐君也而獨不忍於佩玉乎陽貨雖倍狡則有餘焉有以季孫所不忍者而著為之斂乎抑季氏之盛舉魯國無敢與抗者仲其家臣乎何乃侃侃持議不畏强禦若此蓋非但稱魯君之守臣抑亦季氏之良臣矣不然生無能改其德而死又益其罪寧不中陽貨之謀哉陽貨以璠璵斂平子非厚季氏也欲發其瑕釁以叢恨於季氏耳仲梁懷一言折其謀矣仲梁懷不逐桓子必不囚此有國家者不可一日無爭臣也東郭書斂甲齊侯夷儀之役東郭書讓衆使後而先登既下與王猛共止息以待戰猛曰我先登欲攘書之功也書斂甲曰曩者之難今又難焉斂甲示卑遜之意言曩者之雞故後於子今又難焉復將後子矣推其功以與猛而猛遂心服乃笑曰吾從子如驂馬之當服耳豈能先哉靳乃服馬當胸之皮也杜傳謂書斂甲起欲擊猛者非也晳幘晳幘而衣貍製言白幘在首其衣以貍為製也杜云幘齒上下相值也或曰軍中所見言其面貌冠服止矣何暇細及其口中齒乎此足以規杜之失矣杜又以帥為東郭書然白幘貍衣非帥服也衛侯貞卜衛侯正卜夢之吉凶其繇曰如魚竀尾衡流而方羊裔焉大國滅之將亡闔門塞竇乃自後踰竀赤色魚勞則尾赤言衛侯出國反國其勞苦無異魚之赤尾矣自宜安靜以固其位乃縱恣無憚若魚之不能潜伏以息其勞橫流方羊游於水裔其必為緡綸所及矣故下文遂承以大國滅之將亡也杜注本眀以其文簡故解者不逹有異說耳彌甥季康子使冉有弔宋景曹曰以肥之得備彌甥也杜曰彌逺也康子父之舅氏故稱彌甥或謂康子自稱不應云逺以自疏於宋孔疏云彌者增益之義故為逺也即稱逺亦非過也旌繁康子曰有不腆先人之産馬使求薦諸夫人之宰其可以稱旌繁乎旌繁繫馬飾也言不腆之馬不知能稱旌繁之飾否謙其不能當也杜以稱為舉非也躗言晉伐齊取廩丘軍吏令繕將進萊章曰君卑政暴往歲克敵今又勝都天奉多矣又焉能進是躗言也役將班矣杜曰躗過也其言越於實情也服云僞不信言也字林云夢言意不慧也夢言不慧於義無當政不必引耳公㦸其手杜云屈肘非也伸其手如執㦸然指撝之狀也正考父鼎銘左氏正考父鼎銘云一命而僂再命而傴三命而俯循牆而走亦莫豫敢侮莊子正考父一命而傴再命而僂三命而俯循墻而走孰敢不軌二家之文稍異左氏之注曰俯共於傴傴共於僂莊子之注曰曲背曰傴曲腰曰僂身伏曰俯以愚考之僂為小傴似左氏之文為是也至亦莫余敢侮則不若莊義矣君子之恭以為則也豈欲人之莫侮哉莊子下文又有一命而呂巨再命而於車上儛三命而名諸父孰協唐許則非正考父之言也正考父恭人也自鳴其謙而已苟如莊子下文則以謙自律而以侈加人惡得為恭哉宰上之木左氏傳秦繆公襲鄭師出蹇叔哭之公使謂之曰爾何知中壽爾墓之木拱矣公羊傳曰秦伯怒曰若爾之年者宰上之木拱矣宰冡也唐人誄詞常用宰樹蓋本於此盜殺蔡侯申左氏蔡昭侯將如吳諸大夫恐其又遷也承公孫翩逐射之入於家人而卒以兩矢門之衆莫敢進文之鍇後至曰如墻而進多而殺二人鍇執弓而先翩射之中肘鍇遂殺之杜以翩為蔡大夫也公羊傳弒君賤者窮諸人此其稱盜以弒賤乎賤者也賤乎賤者罪人也疑公孫翩蓋大夫之有罪而被刑者耳申之被弒變起倉卒春秋書盜見其失道而不能衛身也鍇之殺翩也不書以為不足討也榖梁傳春秋有三盜微殺大夫謂之盜盜殺陳夏區夫是也非所取而取之謂之盜陽貨取寶玉大弓是也辟中國之正道以襲利謂之盜齊豹殺衛侯之兄縶是也公孫翩其微者也蘇子由謂翩求名而不得是律之齊豹也齊豹殺公族而欲以得鉏彊之名也彼殺君者天下之惡其誰甘心於是名哉子由之說失左氏之義矣暴尫尫亦巫類蓋選其瘠而怪者以像鬼神也舊注謂瘠病之人其靣向上天哀其病恐雨入其鼻故為之旱其語亦甚俚矣左氏釋卷下
