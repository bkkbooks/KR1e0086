body:
  text: 左氏釋卷上眀馮時可撰莊公寤生寤生者言武姜寐時生莊公至寤始覺其生也夫人之惡者惡其怪也惡其驚也應劭以兒墮地能開目視為寤生是亦一說然不如前說之為妥也或曰莊公本名忤生傳之訛耳史記所云寤生生之難夫人勿愛段生易夫人愛之是也周鄭交質左氏云風有采蘩采蘋雅有行葦泂酌昭忠信也可謂善說詩矣但周之於鄭豈可以二國稱而云君子結二國之信乎王子出質則上陵公子入質則下悖左氏畧其犯義而重於失信所謂放飯流歠而問無齒决也藴藻為聚藻杜說是也或謂藴亦水草名據傳上文云澗溪沼沚下云筐筥錡釜皆以四物成文也然潢汙行潦豈亦四物乎古人意到為文不必又舉一水草以足四物也衛州吁石碏言寵而不驕驕而能降降而不憾憾而能眕者鮮矣寵而不驕本無於中也驕而能降强制於外也降而不憾則責人輕也憾而能眕則保身重也四者鮮焉乃為逆矣亂臣賊子非獨其性然亦由人君之過寵啟之也降降伏其心也眕自安自重也阻兵安忍四言曲盡州吁之為人矣阻兵則無所憚安忍則無能反其所以自固者乃其所以自禍也兵猶火也弗戢將自焚名言乎九宗五正左氏隱公六年春翼九宗五正頃父之子嘉父逆晉侯於隨納諸鄂晉人謂之鄂侯晉舊都翼曰翼侯為曲沃莊伯所伐奔隨故舊都之九宗五正及嘉父逆之于隨而納諸鄂以避曲沃也九宗懐氏一姓九族五正於殷時為五行官長成王以其家族賜唐叔晉之强家也嘉父新為大夫未甚著見故繫之於父云嗚呼大都耦國而知晉之卒併於桓叔也强族立君而知晉之卒裂於六卿也變所由來非一日矣先配後祖鄭公子忽如陳逆婦媯氏歸入於鄭先配而後祖陳鍼子曰是不為夫婦誣其祖矣非禮也何以能育古者逆婦必先告祖廟而後行鄭忽先逆婦而後告廟非禮也嗟乎鄭忽之使齊也不以師昬是不誣其君也焉有不誣其君者而誣其祖哉其或質美而未學也左氏論禮之得失大都徵以禍福其見不逺於聖人他所引謡䜟則或漢人之附㑹耳無駭賜族無駭卒羽父請諡與族公問族於衆仲仲對曰天子建徳因生以賜姓胙之土而命之氏諸侯以字為諡因以為族官有世功則有官族邑亦如之公命以字為展氏盖天子於有功徳之諸侯因其所生之地以賜之姓禄之土地而命之為氏諸侯不得賜姓但以其臣之字為氏因以為族如有能世其官者即以其官為族或食於邑即以其邑為族以字為諡者誤也杜云為諡因以為族者非也以諡為族亦或有之非常法也姓以統一宗氏以别旁枝姓合而氏分也氏族一也異其稱耳諸侯之臣為卿而有功徳則賜族以别之不賜族則仍其舊賜族特典也死而念其功以是報之也生而賜族者臣之援寵而預請非禮也或曰氏族之法可行於今乎曰古者官以世而氏族眀末代官不以世而氏族廢故夫氏族之不可復猶封建之不可復也氏族以輔宗也而卒以滅宗封建以藩王也而卒以叛王雖聖人其如之何嗚呼自秦以還古今判矣滕薛爭長羽父之請薛侯曰周之宗盟異姓為後寡人若朝於薛不敢與諸任齒君若辱貺寡人則願以滕君為請言婉而義正可謂善於詞命矣宗盟猶主盟主盟者列所盟之先後而後異姓周道尚親耳或以為同宗之盟或以為宗伯屬官掌作盟詛之載辭非也側室貳宗師服曰天子建國諸侯立家卿置側室大夫有貳宗士有𨽻子弟言卿置側室以處衆子不得並嫡子之正室大夫有陪臣以輔貳其宗士則主其嫡而𨽻其庻子弟皆强本之謂也或以側室貳宗為官名者非也或以貳宗為小宗者非也楚武王侵隨季梁在隨而楚不能為謀一賢臣之勝於十萬師也彼其能料楚之羸而又以忠於民信於神為道是豈春秋謀臣所可及哉不疾瘯蠡言無疾瘯之患也疥癬曰瘯癭癧曰蠡如追蠡然也嘉栗㫖酒言上下皆有善徳而能敬故得具是㫖酒也祝告之詞皆重在民忠於民即信於神季梁知本矣丁卯子同生接以太牢以太牢告廟言其接祖宗也杜謂以接夫人食其母使補虚氣或以為接見太子皆非也不以隠疾鄭𤣥云隠疾衣中之疾如黑臀黑肱也成公之生其母夢神規其臀以黒曰使有晉國故命之曰黑臀此其名也盖昭神之兆耳苟非有神兆者誰以是名也杜氏曰隠痛疾患辟不祥也亦非也隠痛疾患人自辟矣何必戒哉愚謂隠疾者心之所疾如晉太子之名仇鄭莊公之名寤生皆以其父母心所疾而名不善也日官日御天子有日官諸侯有日御日官居卿以底日禮也日御不失日以授百官於朝日官天子掌厯即太史也下大夫不在六卿之數而位從卿重天時也日官平定日之遲速以頒於邦國日御謹守之而已十七年冬十月日食不書日者魯之日御失之也鄭厲公入鄭内外蛇鬭春秋不書恐以妄疑人也論衡曰凢妖者所見之物皆非物也氣也鄭厲公時内外蛇鬬者非蛇也厲公將入鄭妖氣象蛇而鬭也是也人之所忌其氣燄以取之者言鄭子儀為人所忌宜嚴翼敬恭以自防禦而乃盛氣𦦨𦦨漫不知畏以取此妖異故下文曰人無釁焉妖不自作人棄常則妖興也傅瑕出禦厲公而入殺子儀何貳如之厲公殺之可謂有知數矣下云納我而無二心者此社稷之臣也以見瑕之殺子儀非忠於我原繁之附子儀非忠於子儀也宗祏者慮有非常火災於廟之北璧内為石室以藏木主有事則出而祭之既祭納於石室故曰典司宗祏以宗人為之是宗廟守臣也六月辛未日食莊公二十五年夏六月辛未日有食之鼓用牲於社左氏曰非常也惟正月之朔慝未作日有食之於是乎用幣於社伐鼓於朝杜氏曰非常鼓之月長厯推之辛未實七月朔置閏失所也古人以四月為正月謂正陽之月也周六月夏四月也四月建巳純陽用事人情愛陽而惡隂故謂隂為慝未作謂隂氣未起也案二十四年八月丁丑夫人姜氏入從彼推之則六月辛未非有差錯左氏所謂非常者言鼓用牲於社之非常也諸侯伐鼓於朝用幣於社其常也令尹子元子元激婦人之言以興師因諸侯之救而自止進退無據矣為斾先驅也軍行之次斾最在先耳鄭急而不發門以疑楚楚去而不徹幕以疑鄭以詐遇詐所以無雌雄也水昏正而栽北方之宿為水星水昬正者夜之初昬水星有正中者爾非北方七宿皆正中也杜氏謂今十月定星昬而中於是樹板幹而興作也營室謂之定魯於十二月城諸及防得其時矣雩講肄梁氏雩講將雩而講也肄祭天之禮也祀為大事而肄於梁氏苟簡甚矣圉人犖投葢稷門稷門魯南城門也犖能投而自覆其上勁㨗之甚也夫此力臣也善御之則為衛不善御之則為仇魯莊不委政慶父而慎於擇嗣即百犖何為哉兩社季友之生也楚邱之父卜之曰間於兩社為公室輔外朝之位設於雉門之外乃議事之處執政所在也其地左有亳社右有周社故云間於兩社魯所以存者季友也所以替者季氏也豈天存之而天替之耶春秋譏世卿以此耳祭服五稱衣有裳為稱言相稱也衣裳之制廢而改稱為襲矣申生伐臯落晉公偏衣金玦之賜其意亦欲大子之去也羊舌之言合於正梁餘子養先丹木之言近於權先友欲以兵逺災非至論也衣身之章也佩衷之旗也其語甚工然知為衰世之文矣服其身則衣之純用其衷則佩之度服言近也世子瑜玉所謂度也金玦非度矣命以時卒閟其事也言命於十二月閟盡之時也晉侯受讒畏惡太子速欲其逺不待春夏耳今目之曰閟毋乃過於猜乎是服也狂夫阻之韋昭謂方相氏之士用以詛其盡敵非疑阻也晉公假道荀息假道之詞曰冀為不道入自顛軨伐鄍三門冀之既病則亦惟君故鄍非虞邑也晉邑也服䖍助晉之說是也晉之伐虢其道非必定由於虞而必以賂假者欲其合勢而孤敵耳觀下文虢為不道保於逆旅則虞虢皆晉鄰也分師二道其以全䇿制之哉逆迎也旅客也迎止賔客皆近郊之處而虢保聚於兹以挑大國之釁其滅亡宜爾所謂天奪之鑑而益其疾也筮短龜長筮短龜長出於卜人術家自神其說也而杜以為物生而後有象象而後有滋滋而後有數龜象筮數故象長數短然象數非有先後則筮龜曷有短長耶繇者卜兆辭也專之渝攘公之羭者言變生於專信能損人美善之徳也羭羊名美善之辭皆從羊故羭為美也薫蕕並陳而十年猶臭善易消惡難除也晉侯伐虢輔車相依脣亡齒寒兩頰為輔牙根為車或引詩其車既載乃棄爾輔然車輔有大小於鄰國之義似未恊耳均服振振戎事上下同服所以疑敵而防帥也或曰均作衫黑衣也既云黑衣則何取於振振哉天䇿星名在尾之末焞焞光㣲也丙子旦日在尾月在䇿鶉火中必是時也杜云十月之朔日月合尾月行疾故至旦而過在䇿爾公以時問迂矣而卜偃荅之抑何灼然大都左氏所稱引謡詞皆後人竄入葢漢時人主尚讖故治左氏之儒附㑹其説以阿世爾未必實然也圍新宻杜云實新宻而經言新城者鄭以非時興土功齊桓聲其罪以告諸侯也桓本責鄭之逃盟而以不時興役為言所以結新宻之民心而自託於方伯之義也齊人伐鄭鄭孔叔所言心則不競何憚於病言已無爭競之心則人不得而害之故不憚於病葢欲其下齊耳杜以競為强非也官受方物諸侯官受方物言班示所當貢天子之物於諸侯令諸侯備而貢天子也嗚呼周室之有籍也而受之於齊王道其替哉荀息傅奚齊荀息荅獻公之言曰不濟則以死繼之是眀知有三怨之作矣君命不正宜露齒裂齦以死争之而甘受亂命豈所謂知無不為耶君子因白圭之詩言荀息之玷於言也夫荀息之死於後者忠也言於前者非忠也後正前愆寧相掩乎以是藐諸孤言奚齊之弱小也送徃事居耦俱無猜言兩者皆無恨於心也狐突見太子狐突至下國而太子見焉抑何靈爽乃爾此或當時見晉侯之忌克而遂神其事託為共太子無禮之言以責之也不然以一訴滅晉復以一請存晉天果易凟者耶因己之祀而滅晉之祀以申生之恭豈遂有此逆徳不經之語君子所不信矣七輿大夫杜云侯伯七命副車七乗每車一大夫主之七輿大夫皆丕鄭之黨殺丕鄭故及之耳討貳而及其黨則一國之衆孰不疑阻是宜其不終也或云上軍之七帥者非也晉惠公閉糴虢射所謂皮之不存毛將安傳言棄大信而惜小利則不能有其利也信為立身之根本無信不立虢射之言正諭也杜謂秦怨已深雖與之糴猶無皮而施毛恐非是意晉侯秦伯戰於韓涉河侯車敗者秦斥侯之車壊也故以之詰卜徒父耳三敗及韓者秦敗晉之守戍而及於韓故下文晉侯曰㓂深矣三敗則其深可知矣千乘三去承上二敗而言也巽下艮上為蠱故曰蠱之貞風也其悔山也内卦為貞外卦為悔在内則居中故為貞在外則將亢故為悔巽為風秦象艮為山晉象時正九月故曰歲云秋矣落其實而取其材風之克山也反首相招也㧞舍草宿也登臺履薪欲自焚也爰田易田也唐氏所謂讓肥取磽是也宋公楚人戰於泓子魚曰三軍以利用也金鼓以聲氣也利而用之阻隘可也聲盛致志鼓儳可也金鼓以聲其氣倡士卒之勇也志不能盡致於三軍假鼓以致之故聲盛致志儳巖為隘敵所不能整陳也楚子過鄭鄭文夫人芉氏姜氏勞楚子於柯澤楚子使師縉示之俘馘君子曰非禮也婦人送迎不出門見兄弟不踰閾戎事不邇女器葢女子所御之物戎士近之則怠志而損武况可以俘馘示女哉策名委質狐突曰䇿名委質貳乃辟也註名書於所臣之䇿屈膝而君事之則不可以貳辟罪也正義曰質形體也屈膝而委身體於地也或云質贄也姜氏殺蠶妾齊秦之納惠而舍文利愚而忌賢也故於公子之來也妻以女富以馬陽曰厚之而隂縻之耳從者桑下之謀恐失時也姜氏之殺蠶妾其得大計乎紀綱之僕秦伯送衛於晉三千人實紀綱之僕綱為大繩紀為細縷三千人則秦數教之卒如大小事故謂紀綱之僕註曰諸門户僕𨽻之事皆使秦卒共之與晉人為紀綱非也室如懸罄凢物懸則罄盡室如懸罄言其盡也或以為有桷無覆如懸罄然也距躍三百曲踊三百距躍直跳也曲踊横跳也杜註一百為勱而或云魏犫以傷病之人不可為六百跳故以意解耳然距躍曲踊非見使之狀也犫自陳其平日從君周旋先後奔騖之不寧有如此耳三百言其多也大斾左旃大斾大旗所以統前軍也旗大難展故設左右旃於其旁以便指揮或以旃為斾上之一物或云左軍所建非也衛侯與元咺訟周禮命夫命婦不躬坐獄訟元咺不宜與其君對坐故使鍼莊子為坐也大士治獄官也士榮為衛大士曉獄情能對獄故亦擕之以求折元咺也甯子職納槖饘主君之服食也槖饘非輔臣所親而甯子以君囚於深室不辭卑褻杜氏所謂忠至而慮深信矣公壻池公壻池人名晉舊以衛匡戚之田與鄭今使鄭歸之衛而復以所封公壻池者致之鄭也自申至於虎牢之竟皆公壻池之封地即鄭之舊地也右盂左盂宋公為右盂鄭伯為左盂田獵陳名也楚主諸侯而驅之以田張而失道矣兩甄楚之獵也期思公復遂為右司馬子朱及文之無畏為左司馬杜云將獵張兩甄故置二左司馬其右司馬一人則當中央兩甄之張所以統左右盂也軍翼曰甄晉書周訪傳亦有兩甄之名梁書裴邃壽陽之戰為四甄以待之葢甄以䕶中軍猶墻之䕶屋也故取義焉耏門宋之禦鄋瞞也皇父之二子死焉古本有皇父及二子死者疑是也皇父榖甥牛父皆死獨耏班収其功故受賞耳耏班皇父之御也御不可以加爵故宋公以門賞使食其征謂之耏門左氏志之見賞之不以賤遺也襄仲辭玉聘義云以圭璋聘重禮也已聘而還圭璋此輕財重禮之義也襄仲之辭玉也不敢助伐晉耳魯與晉同姓而祍席乎晉晉為主盟秦雖强大其龍盾虎韔豈能越國而耀乎沂泗之間則非畏也西乞術得其情矣故終始不言及晉而但云徼福於周公魯公結二國之好而已葢雖不冀其伐晉亦可止其不救也二子皆可謂不辱君命哉交綏羈馬之戰秦晉交綏司馬法云將軍死綏舊說軍郤將當死綏必是退軍之名綏訓為安也兵務進取耻言其退故以綏為名也愚謂綏者収軍之名非退軍之謂也鹿死不擇音莊子獸死不擇音郭象註云野獸蹴之窮地意急情盡則和聲不至以音為廕者非也鋌而走險急何能擇言以鋌鋌鹿而鹿之走險也急則何能擇音此以喻其事之廹急而詞不能遜順也趙盾為旄車之族旄車公行之官主公車行列賤官也盾以異母弟屏季為宗統其族人使嗣己位而以其所出嫡子反為旄車之族報君姬氏君姬氏能下狄女而趙宣子能先庻弟以徳報徳賢矣盈貫赤狄伐晉圍懐及邢丘晉侯欲伐之中行桓子曰使疾其民以盈其貫將可殪也以䋲穿物謂之貫言其惡之多如物之滿於貫也杜以為習者非也軍行右轅左追蓐杜云在車之右者挾轅為備在車之左者追求蓐草為宿衛此是在道時指一車之左右言也或以左軍右軍則其相去亦逺豈三軍之中獨有一軍為戰備耶前茅慮無茅昧中之眀也在前者眀慮其非常之變也杜氏曰前有斥候蹹伏皆持以絳及白為幡見騎賊舉絳幡見步賊舉白幡此行師所必有而楚用得其人能不失命耳二廣傳云其君之戎分為二廣廣有一卒卒偏之兩廣楚乘車名十五乘為一廣楚王以其親兵分左右二部故名二廣司馬法百人為卒二十五人為兩一廣每乘用百人而四分之以其一為承副令畨休以備不虞耳偏猶挑也靡旌摩壘靡敵人之旌而摩敵人之壘也靡切比之謂也言敢進也兩馬掉鞅傳文左射以菆代御執轡御下兩馬掉鞅而還菆矢之善者兩飾也車左射畢則代御執轡御下飾馬而左於此時掉鞅示閒暇也脫扄㧞斾傳文晉人或以廣隊不能進楚人惎之脫扄少進馬旋惎之㧞斾投衡乃出夫楚人之教晉人脫扄投斾只欲其遁而已不欲盡敵也楚師既老晉卒猶盛追奔大急或反戰而致死於我將若之何是楚所慮也或以惎為毒言楚人惎毒而殺害之故晉人脫扃以免夫既被毒殺而又何能脫扄反斾乎不如前說之為當也惎教也扃車上兵闌也還便旋不進也㧞旗投衡上使不㠶風差輕乃得出耳知莊子抽矢菆知莊子以其子知罃之囚於楚也故以其族還戰毎戰必抽善矢而納之房恐傷人太多益楚之怨不能得其子也㕑子以為蒲之爱則不得其情矣齊髙固桀石杜云桀擔也令人擔石於車入晉師則用以投人也繫桑本也固雖有勇而氣張志滿不整以暇可以見齊師之無節制矣宜其敗哉若晉帥左輪朱殷而不言病至不見丘緩之推車何其嚴翼一志乃爾此所以能克齊也蜃炭杜云燒蜃為炭是也大蛤為蜃燒之成炭可以禦濕劉炫以為用蜃復用炭以生蜃為殯此恐無當於用郇瑕氏郇瑕氏河東解縣其惡易覯言水淺而垢穢易見也墊隘委頓也沉溺濕疾重膇足腫以盬為鹽惟河東獨然餘鹽不名盬也膏肓心在上鬲在下心下有㣲脂為膏鬲上有薄膜為肓二豎居膏肓之上下則於腑臟畧無所係為至虚之處非經絡穴道所闗以故攻之不可逹之不及藥不至焉也醫緩以術見禮而桑田巫以術見殺術固有幸不幸也金奏作於下鄭𤣥燕禮註云以鐘鎛播之鼓磬應之所謂金奏也作樂先擊鐘是金為奏節之初也樂以和賔而置之地室示不欲和也郤至不入亦疑有伏姦耳而子反又稱一矢以恐之所以引詩之武夫為對葢以譏楚也語曰非我族類其心必異楚之謂哉能者養之以福劉歆引傳云能者養之以福師古曰之徃也徃以就福正是合下文敗以取禍師古曰之徃也徳云君子之不徼福是腐儒之說也聖人何嘗不言禍福中庸稱舜之大孝而引假樂之詩及易所言餘慶餘殃皆是也聖賢立教為凢民而設語祸福何愆哉孫文子衛孫文子與魯君齊登穆叔讓之孫子無辭亦無悛容穆叔曰孫子必亡為臣而過君而不悛亡之本也詩曰退食自公委蛇委蛇謂從者也衡而委蛇必折從順也衡横也委蛇自得之貌順道而自得則可貴横不順道而妄焉自得必毁折矣火正傳宋既災而士弱對晉侯之問曰古之火正或食於心或食於咮以出内火是故咮為鶉火心為大火杜註謂火正之官配食於火星建辰之月鶉火星昬在南方則令民放火建戌之月大火星伏在日下夜不得見則令民内火禁放火陸浚明云此獨於鶉火言見大火言伏於義未盡漢書五行註說曰季春昏星出東方而咮七星鳥首正在南方則用火季秋星入則止火以順天時救民疾是二火俱有出納也劉用熙曰食於心食於咮者猶食邑之食謂封火正於火之分野使掌出内之正令非謂死而配食也夫火正而冠以火則當火正之身矣何配食之有云出内火則必非既死之後矣然傳所謂食心食咮者固為當時食邑之食而後代諸侯祭其分野之星其當祭火星者則必以火正配食下文閼伯相土是也宗祧季武子對晉侯曰君冠必以祼享之禮行之以金石之樂節之以先君之祧處之魏了翁曰祧者取廟外之兆域為義鄭𤣥釋祧為超而以為始祖廟者非也縣門發傳偪陽人啟門諸侯之士門焉縣門發聊人紇抉之以出門者縣門者編板廣長如門施闗機以縣門上有冦則發機而下之諸侯之士見門開已有入者縣門乃發聊人紇以木橛抉縣門使舉令諸侯之士出也此仲尼父叔梁紇也堇父登布傳主人縣布堇父登之及堞而絶之隊則又縣之蘇而復上者三主人辭焉乃退帶其斷以狥於軍三日堇父三隊則悶絶屢矣而復欲上是以死為戯孔子所為馮河之勇也即登而上不足以克又何取焉以其斷狥軍其無法哉桑林桑林殷天子之樂名殷禱桑林以得雨遂以名其樂也賓用禘樂魯之失禮荀偃士匄引過謬之事以謟晉侯其不知禮乎及晉侯駭於旌夏而得疾乃又欲以罪加之宋欺君誣神二子之失大矣騂旄之盟騂赤牛旄其牡也此重盟所用也盟以結信先王所不禁而先王無有盟也春秋之世要質鬼神以行其私乆矣騂旄之盟其託先王而言也合要范宣疑乎王叔氏與伯輿故令書契以為要約也王叔氏不能舉其契者志不在要故若不能舉而隊之耳或以為伯輿辭直王叔無以應之非也叔老㑹鄭伯伐許左氏齊子帥師㑹晉荀偃書曰㑹鄭伯為夷故也此縁諸國皆大夫而鄭獨以君當時列國之諸侯屈於伯國之大夫君臣名分陵夷甚矣故齊子本㑹荀偃而經特以㑹鄭伯為文列之諸臣之上不使夷於諸大夫也袗甲面縛袗結也以繩并其甲結之而縛手於後則惟見其人之面也南風不競魚陵之役晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功杜云歌者吹律以詠八風南風音微故曰不競師曠唯歌南北二風聽晉楚之强弱服䖍以為卯酉以北律呂為北風以南為南風不如杜說之長也莊公為勇爵杜註所謂設爵位以命勇士也或謂以爵觴勇士者非也平隂之役殖綽郭最已皆衿甲面縛坐於晉中軍之鼓下矣未見其復歸於齊也即歸於齊以亡虜之游魂桑榆之效曾莫之收何得言雄而又何敢以請勇爵也此葢記載者之誤可以知非邱眀筆矣齊侯伐衛前鋒軍曰先驅次前軍曰申驅公副車曰貳廣左翼曰啟右翼曰胠後軍曰大殿凡左右以左為先詩曰以先啟行故啟為左也胠為掖下在旁之軍也陳侯免擁社杜曰喪服而抱社主以示降服也嗚呼陳之不競甚矣而子展執縶而見子美數俘而出鄭其有禮哉是子産執政也表淳鹵數疆潦賈逵云淳鹹也鹵西方鹹地也東方謂之斥西方謂之鹵淳鹹地薄収獲常少故表之輕其賦稅愚謂淳厚也分别其厚薄也數疆潦意亦同數選也選其為疆為潦以髙下其賦也單斃其死單獨也言匹夫一為不信猶尚不可彼豈能死人徒自踣而死爾食言者不病言食言之人何足為病此正以應夫單斃其死之文也鳥帑二十八年春梓慎曰今之宋鄭其饑乎歲在星紀而淫於𤣥􅑎蛇乘龍龍宋鄭之星也宋鄭必饑𤣥􅑎虚中也􅑎耗名也土虚而民耗不饑何為按星紀在丑淫於𤣥􅑎過丑而子也歲星木也木為青龍失次而出虚危之下為蛇所乗故曰蛇乘龍也東方房心為宋角亢為鄭是占也主歲所次而言也禆竈曰今兹周王及楚子皆將死歲棄其次而旅於眀年之次以害鳥帑周楚惡之按鳥尾曰帑妻子曰帑皆以後也是占也主歲所衝而言也歲星漸西衝則漸東故衝其身而及其尾也歲離次則不福故民遭其饑歲見衝則有禍故君當其斃二子之言其事俱驗然吉凶在人歲何與焉桃茢祓殯茢苕也以苕為菷桃為柄也禭衣所以衣尸也既殯而使公禭者所以結恩好其衣不必充用魯既朝楚又何有於親禭祧茢袚殯其亦過矣夏肄是屏晉平公以把出而城把子太叔尤之曰晉國不恤周宗之闕而夏肄是屏其棄諸姬亦可知也己肄枿餘也把為夏後滅而復有猶木之枿生小栽也故謂之夏肄平公崇私報而勤諸侯重母族而輕宗姓其何以為盟主瘠魯肥把抑又甚矣射者三耦魯公享范獻子射者三耦公臣不足取於家臣燕而享常也左氏何志焉以見公室卑㣲公臣不能備於三耦重替政也象箾南籥象象其功徳也箾則舞者所執之竿即詩序所為維清清奏象舞武舞也南籥二南之籥文舞也以籥舞也美猶有憾者言文王事殷之心雖忠而視民如傷之意尤至何忍殷民之困於糾亂必有憾焉者矣取我衣冠而褚之褚衣之囊也衣冠之不法者藏之於囊不敢服也三易衰衰衽如故衰此言昭公嬉戯無度衣衽易垢所謂猶有童心也左氏可謂善狀矣設服離衛楚公子圍設服離衛言其設僚服列侍衛偃然有為君之心非遂為君服也蒲宮有前蒲宮楚君之離宮也執戈在前蒲宮之衛也子圍之僭擬於離宮尚未同於公宮也杜註緝蒲為王殿屋屏蔽以自殊異非也秦后子舎車十里舎車傍車於十里之郊自雍及絳者皆止於止也其設享之幣去絳不過十里使之相續而來每獻皆到以示己之豪富也五降醫和之對晉侯曰先王之樂所以節百事也故有五節遲速本末以相及中聲以降五降之後不容彈矣於是有煩手滛聲慆堙心耳乃忘平和君子弗聽也物亦如之至於煩乃舎也己無以生疾葢樂有五聲宮啇角徴羽其相生大小之次皆有節焉先王所以成樂而用以節百事遲速本末皆有倫序以及於中也五聲本以黄鐘為宮然還相為宮則其餘十一律皆可為宮宮必為君而不可下於臣商必為臣而不可上於君角民徴事羽物皆以次降殺其有臣過君民過臣事過民物過事者則不用正聲而以半聲應之是為五降五降得其節則八音克諧無相奪倫而可彈若是五降而後則非復正音如鄭衛之音君子弗聼故不容彈也周禮凢建國禁其淫聲過聲㓙聲慢聲是也事之有則也猶樂之有節也失節而至於煩煩而不舎必生疾矣女陽物而晦時女隂也隂中有陽其物為火夜為隂則女以晦為時也淫於女所謂陽淫晦淫也懿伯之忌叔弓如滕㑹𦵏公子服椒為介遇懿伯之忌敬子不入服椒曰公事有公利無私忌椒請先入乃受館敬子從之杜言叔弓禮椒為之避仇也正義曰服椒之叔父為人所殺及滕郊而逢其仇故敬叔不入以禮惠伯欲使惠伯執叔父之仇也陸云忌謂忌日也或曰父母之亡日為忌日未聞於叔父而有忌日也雖然禮以義起忌日為哀也服椒之叔父以是日被殺則為猶子者於忌日能不哀乎不入可也杜氏所以稱叔弓之有禮也西陸朝覿西陸與朝覿二時皆為出氷候也夏三月日在昴畢蟄蟲出而用氷此言西陸也春分之中奎星朝見東方此言朝覿也左氏釋卷上
