body:
  text: 左氏釋春秋類提要臣等謹案左氏釋二卷明馮時可撰時可字敏卿號元成華亭人隆慶辛丑進士官至湖廣布政司恭政事迹附見明史馮恩傳此書皆發明左傳訓詁中如解莊公二十五年秋大水鼓用牲於社於門謂王者事神治民有神而無祈有省而無禳用鼓己末何况於攻董仲舒杜預之說皆誤考周禮大祝六祈一曰類二曰造三曰禬四曰祭五曰攻六曰說鄭康成注謂攻說則以辭責之如其鳴鼓然則攻固六祈之一矣時可所言殊為失考至如昭公二十九年賦晉國一鼓鐵以鑄刑鼎杜注孔疏皆謂冶石為鐵用橐扇火謂之鼓刑鼎一鼓便足時可則引王肅家語注云三十斤為鈞四鈞為石四石為鼓蓋用四百八十斤鐵以鑄刑書適給於用則勝注疏說多矣蓋雖間有臆斷而精核者多固趙汸補注之亞也此書舊與左氏討左氏論合為一書總標曰元敏天池集意當時編入集內故鈔本尚襲舊題今惟録此編而所謂討與論則别存目故各分著其名焉乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:957760c91e156f0334eb341e6f6ed3552e927a26e2c893ac29c512bcc149ef83
